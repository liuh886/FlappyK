name: Validate

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  static-and-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Check JavaScript syntax
        run: |
          node --check game.js
          node --check results.js
          node --check legend-ticker.js
          node --check custom-challenge.js
          node --check ui-polish.js
          node --check card-export.js

      - name: Check Python syntax
        run: |
          python -m py_compile fetch_all_data.py scripts/audit_bundled_data.py

      - name: Check HTML structure
        run: |
          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          class Parser(HTMLParser):
              pass

          Parser().feed(Path("index.html").read_text(encoding="utf-8"))
          print("index.html parsed successfully")
          PY

      - name: Audit bundled equity split continuity
        run: python scripts/audit_bundled_data.py
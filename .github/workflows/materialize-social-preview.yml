name: Materialize Social Preview

on:
  push:
    branches: [master]
    paths:
      - og-image.svg
      - .github/workflows/materialize-social-preview.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate PNG from SVG
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          rsvg-convert -w 1200 -h 630 og-image.svg -o og-image.png

      - name: Commit generated preview when changed
        run: |
          git add og-image.png
          if git diff --cached --quiet; then
            echo "Social preview is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: materialize social preview [skip ci]"
          git push

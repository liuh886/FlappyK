name: Validate

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  static-and-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate raster social preview
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends librsvg2-bin
          rsvg-convert -w 1200 -h 630 og-image.svg -o og-image.png

      - name: Check JavaScript syntax
        run: |
          node --check qqq-loader.js
          node --check scripts/friend-challenge-codec.js
          node --check scripts/legend-score.js
          node --check scripts/daily-run-core.js
          node --check scripts/market-pass-rule.js
          node --check scripts/market-goal-ui.js
          node --check scripts/game-pacing.js
          node --check scripts/player-profile.js
          node --check game.js
          node --check results.js
          node --check legend-ticker.js
          node --check custom-challenge.js
          node --check experience.js
          node --check core-hardening.js
          node --check onboarding.js
          node --check friend-challenge.js
          node --check daily-run.js
          node --check ui-polish.js
          node --check leaderboard.js
          node --check share-challenge.js
          node --check card-export.js
          node --check scripts/leaderboard-ranking.js
          node --check playwright.config.cjs
          node --check tests/e2e/product-flow.spec.js
          node --check tests/ui-regression.test.js
          node --check tests/leaderboard-ranking.test.js
          node --check tests/friend-challenge.test.js
          node --check tests/legend-score.test.js
          node --check tests/market-pass-rule.test.js
          node --check tests/player-profile.test.js
          node --check tests/daily-run.test.js

      - name: Run regression checks
        run: |
          node tests/ui-regression.test.js
          node tests/leaderboard-ranking.test.js
          node tests/friend-challenge.test.js
          node tests/legend-score.test.js
          node tests/market-pass-rule.test.js
          node tests/player-profile.test.js
          node tests/daily-run.test.js

      - name: Check Python syntax
        run: |
          python -m py_compile fetch_all_data.py scripts/audit_bundled_data.py

      - name: Check HTML, social preview, and leaderboard data
        run: |
          python - <<'PY'
          import json
          from html.parser import HTMLParser
          from pathlib import Path

          class Parser(HTMLParser):
              pass

          Parser().feed(Path("index.html").read_text(encoding="utf-8"))
          payload = json.loads(Path("data/leaderboard.json").read_text(encoding="utf-8"))
          entries = payload.get("entries", [])
          assert isinstance(entries, list)
          assert len(entries) <= 10

          image = Path("og-image.png").read_bytes()
          assert image[:8] == b"\x89PNG\r\n\x1a\n"
          width = int.from_bytes(image[16:20], "big")
          height = int.from_bytes(image[20:24], "big")
          assert (width, height) == (1200, 630), (width, height)
          print("index.html, og-image.png, and leaderboard.json validated")
          PY

      - name: Check onboarding, daily, challenge, sharing, pacing, records, and leaderboard integration
        run: |
          grep -q '"QQQ"' fetch_all_data.py
          grep -q 'qqq-loader.js' index.html
          grep -q 'REAL HISTORICAL K-LINES' index.html
          ! grep -q 'NOT LIVE DATA' index.html
          grep -q 'onboarding.js' index.html
          grep -q 'onboarding.css' index.html
          grep -q 'onboarding-screen' index.html
          grep -q 'onboarding-start-btn' index.html
          grep -q 'POSITIVE EXCESS PASSES' index.html
          grep -q 'scripts/friend-challenge-codec.js' index.html
          grep -q 'scripts/legend-score.js' index.html
          grep -q 'scripts/daily-run-core.js' index.html
          grep -q 'daily-run.js' index.html
          grep -q 'daily-run.css' index.html
          grep -q 'daily-run-btn' index.html
          grep -q 'daily-run-summary' index.html
          grep -q 'daily-run-result' index.html
          grep -q 'scripts/market-pass-rule.js' index.html
          grep -q 'scripts/game-pacing.js' index.html
          grep -q 'scripts/player-profile.js' index.html
          grep -q 'local-records.css' index.html
          grep -q 'personal-profile-summary' index.html
          grep -q 'personal-best-result' index.html
          grep -q 'pause-btn' index.html
          grep -q 'btn-pause' index.html
          grep -q 'BEAT THE MARKET' index.html
          grep -q 'card-market-return' index.html
          grep -q 'friend-challenge.js' index.html
          grep -q 'friend-challenge-result' index.html
          grep -q 'share-challenge.js' index.html
          grep -q 'challenge-share-btn' index.html
          grep -q 'og-image.png' index.html
          grep -q 'leaderboard.js' index.html
          grep -q 'leaderboard-open-btn' index.html
          grep -q 'leaderboard-submit-btn' index.html
          grep -q 'issues:' .github/workflows/leaderboard.yml
          grep -q 'LEADERBOARD_LIMIT = 10' scripts/leaderboard-ranking.js

      - name: Audit bundled equity split continuity
        run: python scripts/audit_bundled_data.py

  browser-smoke:
    needs: static-and-data
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install test dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npm run test:e2e

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
